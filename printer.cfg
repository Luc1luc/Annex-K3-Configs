#####################################################################
#   Includes
#####################################################################

[include mainsail.cfg]
[include toolhead.cfg]
[include movement.cfg]
[include heater_bed.cfg]
[include sensorless.cfg]
[include macros.cfg]
[include config_backup.cfg]
[include K-ShakeTune/*.cfg]
#[include adxl.cfg]
[include tmc_autotune.cfg]

#####################################################################
#   Printer Core
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_26001A000651313433343333-if00

restart_method: command

[virtual_sdcard]

path: ~/printer_data/gcodes/
on_error_gcode:
    SAVE_GCODE_STATE NAME=on_error_gcode
    G91
    G1 Z10 F6000
    RESTORE_GCODE_STATE NAME=on_error_gcode

[printer]
kinematics: cartesian
max_velocity: 500 
max_accel: 25000
max_z_velocity: 10
max_z_accel: 1500
square_corner_velocity: 5

[input_shaper]
shaper_type: mzv
shaper_freq_x: 73.8
shaper_freq_y: 73.2

[idle_timeout]
timeout: 18000

[force_move]
enable_force_move: True

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 3
show_macros_in_webui: True
timeout: 300

#####################################################################
#   Probe
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_FC003D334E5737374D202020FF112D2D-if00 
speed: 8
lift_speed: 10
backlash_comp: 0.5
x_offset: -25
y_offset:  0
contact_max_hotend_temperature: 185 # increase to probe at print temps
home_xy_position: 35, 35 # update with your safe position
home_gcode_pre_x: _PRE_HOME_X
home_gcode_post_x: _POST_HOME_X
home_gcode_pre_y: _PRE_HOME_Y
home_gcode_post_y: _POST_HOME_Y
home_z_hop: 5
home_z_hop_speed: 30
home_xy_move_speed: 300
home_method: contact
home_method_when_homed: proximity
home_autocalibrate: always
trigger_distance: 2.
trigger_dive_threshold: 1.
trigger_hysteresis: 0.006  # Hysteresis on trigger threshold for untriggering, as a percentage of the trigger threshold.
cal_nozzle_z: 0.1
cal_floor: 0.2
cal_ceil: 5.
cal_speed: 1.
cal_move_speed: 20
default_model_name: default
mesh_main_direction: x
mesh_cluster_size: 1
mesh_runs: 2


[resonance_tester]
accel_chip: beacon
probe_points: 90, 90, 50
accel_per_hz: 75

#####################################################################
#   Electronics Bay
#####################################################################

[temperature_sensor CM4]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor Manta]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 100

[temperature_sensor Chamber]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4
min_temp: 0
max_temp: 115

[temperature_sensor Chamber_Toolhead]
sensor_type: Generic 3950
sensor_pin: PA7
min_temp: 0
max_temp: 115

## Electrics Fan - FAN4
[multi_pin electronic_fans]
pins: PF8,PA4
[controller_fan Electronic_Fan]
pin: multi_pin:electronic_fans
max_power: 1.0
kick_start_time: 1.5
cycle_time: 0.01

[output_pin caselight] 
pin: PA3 
pwm: True 
value: 0 
cycle_time: 0.001 
hardware_pwm: False

#####################################################################
#   Input Shaping
#####################################################################

[gcode_shell_command plot_graph]
command: bash /home/pi/printer_data/config/scripts/plot_graphs.sh
timeout: 500.0
verbose: True

#####################################################################
#   MISC
#####################################################################

[exclude_object]
