#####################################################################
#   Extruder
#####################################################################
[extruder]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
rotation_distance: 22.54086 #CNC Hextrudort
#rotation_distance: 23.238 #CNC Sherpa Mini
gear_ratio: 6.25:1 #CNC Sherpa Mini | CNC Hextrudort
microsteps: 32
full_steps_per_rotation: 200
pwm_cycle_time: 0.010
nozzle_diameter: 0.5
filament_diameter: 1.75
heater_pin: PA0
sensor_type: PT1000
pullup_resistor: 2200
sensor_pin: PB0
min_temp: 1
max_temp: 320
max_power: 1.0
min_extrude_temp: 1
control: pid
pid_Kp: 25.416
pid_Ki: 1.554
pid_Kd: 103.886
pressure_advance: 0
pressure_advance_smooth_time: 0.04


[tmc2240 extruder]
cs_pin: PG14
spi_software_sclk_pin: PG8
spi_software_miso_pin: PG7
spi_software_mosi_pin: PG6
interpolate: false
run_current: 0.6
stealthchop_threshold: 0
rref: 12000


#####################################################################
#   Fans
#####################################################################

##  Hotend Fan - FAN0
[heater_fan hotend_fan]
pin: PF7
max_power: 1.0
fan_speed: 1.0
kick_start_time: 0.4
cycle_time: 0.01
heater: extruder
heater_temp: 60.0

## Part Fan - FAN1
[fan]
pin: PF9
min_power: 0.05
max_power: 0.8
kick_start_time: 0.2
cycle_time: 0.005

